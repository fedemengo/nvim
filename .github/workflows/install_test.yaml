
name: Install Test

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  install-test:
    runs-on: ubuntu-slim
    if: >
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, '[install]') ||
      contains(github.event.pull_request.title, '[install]')

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y git curl nodejs npm ripgrep fd-find

      - name: Install Neovim
        run: |
          curl -LO https://github.com/neovim/neovim/releases/download/stable/nvim-linux-x86_64.tar.gz
          sudo tar -xzf nvim-linux-x86_64.tar.gz -C /usr/local --strip-components=1
          rm nvim-linux-x86_64.tar.gz

      - name: Install test
        run: make test-install NVIM_TEST_DIR=/tmp/nvim-test
